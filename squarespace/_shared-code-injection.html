<!-- ============================================================
     Surf & Turf Lodge — SHARED SETUP (paste ONCE)

     Squarespace:  Settings  ->  Advanced  ->  Code Injection  ->  HEADER
     Paste this entire block there and save. It loads the fonts, the
     scoped styling, and the small script that powers the live
     "Open now / Closed" badge and today's-hours highlight on every page.

     Everything is scoped under ".stl-embed" so it will NOT touch the
     rest of your Squarespace theme.
============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

<style>
  /* Scoped so it only affects the pasted code blocks, never your theme */
  .stl-embed, .stl-embed * { box-sizing: border-box; }
  .stl-embed {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: #2b1c12;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .stl-embed img { display: block; max-width: 100%; }
  .stl-embed a { color: inherit; text-decoration: none; }
  .stl-embed h1, .stl-embed h2, .stl-embed h3, .stl-embed p { margin: 0; }
  .stl-embed ::selection { background: #a3352a; color: #fbf4e4; }

  @keyframes stl-fade {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }
  .stl-embed .stl-lift { transition: transform 0.15s ease; }
  .stl-embed .stl-lift:hover { transform: translateY(-2px); }

  /* The menu page's section chips stick under your Squarespace header.
     If your header overlaps the chips, raise this value to your header
     height (e.g. 60–80px). */
  .stl-embed .stl-chips { top: 0; }
</style>

<script>
/* Surf & Turf Lodge — live open/closed status + today's-hours highlight.
   Pure vanilla JS, scoped to elements carrying data-* hooks. */
(function () {
  "use strict";
  var SCHEDULE = { 0: [11, 15], 1: null, 2: null, 3: null, 4: [16, 20.5], 5: [15, 21], 6: [15, 21] };
  var DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  function fmt(h){var hr=Math.floor(h),min=Math.round((h-hr)*60),ap=hr>=12?"pm":"am",h12=hr%12;if(h12===0)h12=12;return min?h12+":"+String(min).padStart(2,"0")+ap:h12+ap;}
  function status(){
    var now=new Date(),d=now.getDay(),h=now.getHours()+now.getMinutes()/60,t=SCHEDULE[d];
    if(t&&h>=t[0]&&h<t[1])return{open:true,label:"Open now",detail:"Serving until "+fmt(t[1])};
    for(var k=0;k<=7;k++){var di=(d+k)%7,s=SCHEDULE[di];if(s&&(k>0||h<s[0])){var when=k===0?"today":(k===1?"tomorrow":DAY_NAMES[di]);return{open:false,label:"Closed now",detail:"Opens "+when+" at "+fmt(s[0])};}}
    return{open:false,label:"Closed",detail:""};
  }
  function each(sel,fn){Array.prototype.forEach.call(document.querySelectorAll(sel),fn);}
  function applyStatus(){
    var st=status();
    var dot=st.open?"#5b8a3a":"#c0563f",bg=st.open?"#dcebcb":"#f3ddd2",fg=st.open?"#3c5e22":"#8a2a20";
    each("[data-status-dot]",function(e){e.style.background=dot;});
    each("[data-status-label]",function(e){e.textContent=st.label;});
    each("[data-status-detail]",function(e){e.textContent=st.detail;});
    each("[data-status-pill]",function(e){e.style.background=bg;e.style.color=fg;});
  }
  function highlightHours(){
    var today=new Date().getDay();
    each("[data-hours-row]",function(row){
      var day=parseInt(row.getAttribute("data-day"),10);
      var closed=row.getAttribute("data-closed")==="1";
      var isToday=day===today||(day===-1&&(today===1||today===2||today===3));
      var weight=isToday?"700":"500";
      var color=isToday?"#a3352a":(closed?"#9c8a68":"#2b1c12");
      Array.prototype.forEach.call(row.querySelectorAll("span"),function(s){s.style.fontWeight=weight;s.style.color=color;});
    });
  }
  function init(){applyStatus();highlightHours();}
  if(document.readyState!=="loading")init();else document.addEventListener("DOMContentLoaded",init);
})();
</script>
